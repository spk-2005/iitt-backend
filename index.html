    <!-- FAQPage — feeds directly into Google FAQ rich results and LLM answers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Anseru?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru is a deal intelligence platform designed for enterprise sales teams. It helps companies respond to RFPs, security questionnaires, and compliance requests by turning past deal knowledge into structured, reusable intelligence using AI agents."
          }
        },
        {
          "@type": "Question",
          "name": "How is Anseru different from traditional RFP tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most RFP tools focus on storing answers or generating responses. Anseru focuses on understanding the deal context — including industry, compliance requirements, and prior responses — so teams don't have to start from scratch each time. Anseru uses AI agents to orchestrate the full response lifecycle."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Anseru built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru is built for teams involved in complex enterprise deals, including solutions engineering, security and compliance, and revenue operations. These teams typically collaborate to respond to procurement and due diligence requests."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can we start seeing value?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Teams typically see value within their first few deals. As more RFPs or security questionnaires are processed, Anseru begins reusing existing knowledge and reduces manual effort over time."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the responses generated by Anseru?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru combines AI-generated responses with validation layers such as source references, review workflows, and internal standards. Knox, the Security Questionnaire Agent, achieves 95%+ response accuracy from verified security documentation. This ensures responses are reliable, auditable, and aligned with company guidelines."
          }
        },
        {
          "@type": "Question",
          "name": "How does Anseru improve over time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru learns from every interaction, edit, approval, and past response captured across deals. This allows the system to continuously improve accuracy and relevance over time through its Living Knowledge Engine."
          }
        },
        {
          "@type": "Question",
          "name": "How does Anseru integrate with our existing tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru is designed to work alongside your existing systems, including CRM platforms, document repositories, Google Drive, OneDrive, Slack, and collaboration tools. It pulls in relevant knowledge while allowing teams to continue working within familiar workflows."
          }
        },
        {
          "@type": "Question",
          "name": "How do you ensure our data is secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anseru is built with enterprise-grade security in mind, including strict data isolation, access controls, and auditability. Customer data is handled within secure environments and protected according to compliance standards."
          }
        },
        {
          "@type": "Question",
          "name": "Do you use our data to train shared AI models?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Customer data is not used to train shared or public models. Each organization's data remains isolated and is used only to improve its own responses and intelligence within the platform."
          }
        }
      ]
    }
    </script>
