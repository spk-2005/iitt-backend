# netlify.toml — Anseru deployment configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

# ── Build settings ────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA redirect ──────────────────────────────────────────────────
# Required for any React SPA: directs all routes back to index.html
# so the React app handles routing rather than Netlify returning 404.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── Cache headers ─────────────────────────────────────────────────
# Vite hashes all asset filenames on build, so they're safe to cache
# for 1 year (immutable). HTML must never be cached so deploys are
# picked up immediately.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static files in public/ that should be revalidated regularly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"   # 24 h

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Security headers (applied to all pages) ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
